<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.2/dist/confetti.browser.min.js"></script>
    <title>ĐBRR</title>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
      }
      body {
        display: flex;
        justify-content: center;
        align-items: center;

        height: 100vh;
      }
      .container {
        text-align: center;
      }

      .btn-group {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 50px;
        position: absolute;
        top: 60%;
      }

      button {
        transition: 0.25s;
        width: 90px;
        text-align: center;
      }

      button:hover {
        cursor: pointer;
        transform: scale(1.05);
      }

      #yes-btn {
        transition: 0.25s;

        position: fixed;
        top: 60%;
        left: 39%;
        background-color: pink;
        border: none;
        border-radius: 20px;
        padding: 10px 0;
      }

      #no-btn {
        position: fixed;
        top: 60%;
        right: 39%;
        background-color: pink;
        border: none;
        border-radius: 20px;
        padding: 10px 0;
      }

      @media (max-width: 768px) {
        #yes-btn {
          left: 20%;
        }

        #no-btn {
          right: 20%;
        }
      }

      @media (max-width: 306px) {
        #yes-btn {
          left: 10%;
        }

        #no-btn {
          right: 10%;
        }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h2 id="title">Quân Có Đẹp Trai Không ?</h2>
    </div>
    <div class="btn-group">
      <button id="yes-btn">Có</button>
      <button id="no-btn">Không</button>
    </div>

    <script>
      const yes = document.getElementById("yes-btn");
      const no = document.getElementById("no-btn");
      const title = document.getElementById("title");
      yes.onpointerenter = function () {
        const rect = yes.getBoundingClientRect();
        console.log(rect);
        let x = Math.random() * (window.innerWidth - rect.width);
        let y = Math.random() * (window.innerHeight - rect.height);

        yes.style.position = "fixed";
        yes.style.left = `${x}px`;
        yes.style.top = `${y}px`;
      };
      no.onclick = function () {
        title.innerText = "Chính Xác";
        yes.style.display = "none";
        no.style.display = "none";

        const again = document.createElement("button");

        again.style.position = "fixed";
        again.style.top = "60%";
        again.style.left = "50%";
        again.style.transform = "translateX(-50%)";
        again.style.backgroundColor = "pink";
        again.style.border = "none";
        again.style.borderRadius = "20px";
        again.style.padding = "10px 0";
        again.innerText = "Chọn Lại";
        again.id = "again-btn";

        document.querySelector("body").appendChild(again);
        // Bắn từ góc trái
        confetti({
          particleCount: 500,
          angle: 45,
          spread: 130,
          origin: { x: 0, y: 0.65 },
        });
        // Bắn từ góc phải
        confetti({
          particleCount: 500,
          angle: 135,
          spread: 130,
          origin: { x: 1, y: 0.65 },
        });
        again.onmouseenter = function () {
          again.style.transform = "translateX(-50%) scale(1.05)";
        };
        again.onmouseleave = function () {
          again.style.transform = "translateX(-50%)";
        };

        again.onclick = function () {
          again.remove();
          yes.style.display = "block";
          yes.style.top = "";
          yes.style.left = "";
          no.style.display = "block";
          title.innerText = "Quân Có Đẹp Trai Không ?";
        };
      };
    </script>
  </body>
</html>
